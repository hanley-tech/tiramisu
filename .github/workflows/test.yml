name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Tiramisu targets macOS 26 (Tahoe). GitHub's hosted macOS runners
# typically lag major macOS releases by a few months — until they ship a
# macos-26 image with the matching SDK, this workflow detects the gap
# and skips the build with a clear notice instead of failing red. Local
# dev runs `./scripts/ai-check.sh` and the CI catches up automatically
# the moment GitHub adds the right runner.
jobs:
  test:
    name: Build & test on macOS
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Check for macOS 26 SDK
        id: sdk
        run: |
          if xcodebuild -showsdks 2>/dev/null | grep -qE "macosx2[6-9]|macosx[3-9][0-9]"; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "::notice::macOS 26+ SDK detected — running full build + tests."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::macOS 26 SDK is not available on this runner yet (runner is $(sw_vers -productVersion)). Skipping build/test step. Local dev runs ./scripts/ai-check.sh on a Mac with macOS 26. CI re-enables automatically when GitHub ships a macos-26 image."
          fi

      - name: Install xcodegen
        if: steps.sdk.outputs.available == 'true'
        run: brew install xcodegen

      - name: Run ai-check (build + unit + snapshot tests + report)
        if: steps.sdk.outputs.available == 'true'
        run: ./scripts/ai-check.sh

      - name: Upload HTML test report
        if: always() && steps.sdk.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/test-report.html
          retention-days: 30

      - name: Upload xcresult bundle
        if: always() && steps.sdk.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-results-xcresult
          path: build/test-results.xcresult
          retention-days: 14
