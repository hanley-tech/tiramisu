name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Tiramisu targets macOS 26 (Tahoe) on Apple Silicon. The `macos-26`
# runner image has both — pinned explicitly because `macos-latest`
# still resolves to macos-15 at the time of writing. Re-evaluate this
# pin annually as GitHub rotates the `latest` alias forward.
jobs:
  test:
    name: Build & test on macOS 26
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version
          xcodebuild -showsdks | grep -E "^macOS" || true

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Run ai-check (build + unit + snapshot tests + report)
        run: ./scripts/ai-check.sh

      - name: Upload HTML test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/test-report.html
          retention-days: 30

      - name: Upload xcresult bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-xcresult
          # Resolves the symlink — upload-artifact follows symlinks by default
          # but the path matcher needs a real directory to glob into.
          path: build/test-results.xcresult/
          retention-days: 14
