name: Tiramisu
options:
  bundleIdPrefix: world.hanley
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "17.0"
  createIntermediateGroups: true
packages:
  RichTextKit:
    url: https://github.com/danielsaidi/RichTextKit
    from: 1.0.0
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: 1.17.0
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEAD_CODE_STRIPPING: YES
targets:
  Tiramisu:
    type: application
    platform: macOS
    sources:
      - path: Tiramisu
        excludes:
          - "Resources/Info.plist"
      # Ship bootstrap.sh inside the app's Resources/ so the one-click
      # "Install Local FLUX-Fill…" action works in distributed builds.
      # GenerativeFillUI looks it up via Bundle.main.url(forResource:)
      - path: scripts/bootstrap.sh
        buildPhase: resources
    resources:
      - Tiramisu/Resources/Assets.xcassets
    info:
      path: Tiramisu/Resources/Info.plist
      properties:
        CFBundleName: Tiramisu
        CFBundleDisplayName: Tiramisu
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "3"
        LSMinimumSystemVersion: "26.0"
        LSApplicationCategoryType: public.app-category.graphics-design
        NSHumanReadableCopyright: "© 2026 Hanley Leung"
        NSCameraUsageDescription: "Tiramisu never uses the camera directly."
        NSPhotoLibraryUsageDescription: "Import photos as layers to compose thumbnails."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: world.hanley.tiramisu.project
            UTTypeDescription: Tiramisu Project
            UTTypeConformsTo:
              - public.json
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - tiramisu
              public.mime-type:
                - application/x-tiramisu+json
        CFBundleDocumentTypes:
          - CFBundleTypeName: Tiramisu Project
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes:
              - world.hanley.tiramisu.project
            CFBundleTypeExtensions:
              - tiramisu
    # Sandbox is INTENTIONALLY DISABLED so the app can spawn the user-installed
    # mflux-generate-fill subprocess for the Local FLUX-Fill backend (see
    # LocalFluxFillService.swift). Sandbox would block executing arbitrary
    # binaries at user paths AND would re-inherit on the subprocess, so mflux
    # itself wouldn't be able to read its HF cache, model weights, or token.
    # Tradeoff: this build is NOT eligible for Mac App Store distribution.
    # Direct distribution via Developer ID + DMG/PKG is unaffected.
    # If the FLUX-Fill backend is ever made an optional/opt-in flavor, the MAS
    # build can re-enable sandbox and just hide that backend from Settings.
    entitlements:
      path: Tiramisu/Resources/Tiramisu.entitlements
      properties:
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: world.hanley.tiramisu
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: RichTextKit
    postBuildScripts:
      - name: Install to ~/Applications (Debug only)
        script: |
          if [ "$CONFIGURATION" = "Debug" ]; then
              "$SRCROOT/scripts/install-global.sh"
          fi
        basedOnDependencyAnalysis: false
        runOnlyWhenInstalling: false
        shell: /bin/bash

  TiramisuTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: TiramisuTests
        excludes:
          # Snapshot goldens + fixture photos are bundled as resources,
          # not compiled. The default path-include pattern would otherwise
          # try to treat .png/.jpg as compilable inputs and warn.
          - "**/__Snapshots__/**"
          - "**/Fixtures/**"
      # Bundled test resources — accessible via Bundle(for: <test>.self).
      - path: TiramisuTests/Fixtures
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: world.hanley.tiramisu.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_STRICT_CONCURRENCY: minimal
    dependencies:
      - target: Tiramisu
      - package: SnapshotTesting
        product: SnapshotTesting

  TiramisuUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: TiramisuUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: world.hanley.tiramisu.uitests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_STRICT_CONCURRENCY: minimal
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
    dependencies:
      - target: Tiramisu

