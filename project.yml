name: Thumbz
options:
  bundleIdPrefix: ai.taiso
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "17.0"
  createIntermediateGroups: true
packages:
  RichTextKit:
    url: https://github.com/danielsaidi/RichTextKit
    from: 1.0.0
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEAD_CODE_STRIPPING: YES
targets:
  Thumbz:
    type: application
    platform: macOS
    sources:
      - path: Thumbz
        excludes:
          - "Resources/Info.plist"
    resources:
      - Thumbz/Resources/Assets.xcassets
    info:
      path: Thumbz/Resources/Info.plist
      properties:
        CFBundleName: Thumbz
        CFBundleDisplayName: Thumbz
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "26.0"
        LSApplicationCategoryType: public.app-category.graphics-design
        NSHumanReadableCopyright: "© 2026 Taiso"
        NSCameraUsageDescription: "Thumbz never uses the camera directly."
        NSPhotoLibraryUsageDescription: "Import photos as layers to compose thumbnails."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: ai.taiso.thumbz.project
            UTTypeDescription: Thumbz Project
            UTTypeConformsTo:
              - public.json
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - thumbz
              public.mime-type:
                - application/x-thumbz+json
        CFBundleDocumentTypes:
          - CFBundleTypeName: Thumbz Project
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes:
              - ai.taiso.thumbz.project
            CFBundleTypeExtensions:
              - thumbz
    entitlements:
      path: Thumbz/Resources/Thumbz.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.bookmarks.app-scope: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.taiso.Thumbz
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: RichTextKit
    postBuildScripts:
      - name: Install to ~/Applications (Debug only)
        script: |
          if [ "$CONFIGURATION" = "Debug" ]; then
              "$SRCROOT/scripts/install-global.sh"
          fi
        basedOnDependencyAnalysis: false
        runOnlyWhenInstalling: false
        shell: /bin/bash
